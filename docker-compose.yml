version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3002:3002"
    environment:
      - MONGO_URL=mongodb://mongo:27017/equiloom
      - PORT=3002
      - JWT_SECRET=supersecretjwt
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:3002
    depends_on:
      - backend

  dashboard:
    build: ./dashboard
    ports:
      - "3001:3001"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:3002
    depends_on:
      - backend

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
